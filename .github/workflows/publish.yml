name: Flarum Auto Publisher

on:
  schedule:
    # 每個定時前面都要有短橫線 `-` 並且縮排正確
    - cron: '1 00 * * *'  # 台灣時間 08:01
    # cron: '2 04 * * *'  # 台灣時間 12:02
    # cron: '4 08 * * *'  # 台灣時間 16:04
    # cron: '4 12 * * *'  # 台灣時間 20:04
    # cron: '3 16 * * *'  # 台灣時間 00:03
  workflow_dispatch: # 保留手動觸發

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 賦予寫入權限，以便推送 history.json
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests feedparser google-generativeai trafilatura

      - name: Run Bot
        env:
          SERVER_API_URL: ${{ secrets.SERVER_API_URL }}
          FLARUM_API_KEY: ${{ secrets.FLARUM_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: python bot.py

      - name: Commit history
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add history.json
          git commit -m "Update post history [skip ci]" || exit 0
          git push
