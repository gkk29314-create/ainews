name: AI Auto News Agent

on:
  schedule:
    - cron: '0 4 * * *'   # 台灣中午 12:00
    - cron: '0 13 * * *'  # 台灣晚上 21:00
    - cron: '0 17 * * *'  # 台灣凌晨 01:00
    - cron: '0 23 * * *'  # 台灣早上 07:00
  workflow_dispatch: # 支持手動點擊執行測試

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出代碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安裝相依套件
        run: pip install requests

      - name: 執行 AI 自動化與傳輸
        env:
          # --- 請在 GitHub Repository Settings -> Secrets and variables -> Actions 中設定以下密鑰 ---
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          GROQ_KEY: ${{ secrets.GROQ_KEY }}
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
          ZHIPU_KEY: ${{ secrets.ZHIPU_KEY }}
          NVIDIA_KEY: ${{ secrets.NVIDIA_KEY }}
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
          SERV00_API_URL: ${{ secrets.SERV00_API_URL }} # 例如 https://yourdomain.com/api/receiver.php
          # ---------------------------------------------------------------------------------------
        run: python ai_processor.py
